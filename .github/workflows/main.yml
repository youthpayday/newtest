name: deploy to server 
on:
 push:
  branches:
   - master
jobs:
 deploy:
  runs-on: Ubuntu-latest
  steps:
  - name: Execute remote SSH commands using SSH key
    uses: appleboy/ssh-action@v1
    with:
     host: ${{ secrets.HOST }}
     username: ${{ secrets.USERNAME }}
     key: ${{ secrets.KEY }}
     port: ${{ secrets.PORT }}
     script: whoami
